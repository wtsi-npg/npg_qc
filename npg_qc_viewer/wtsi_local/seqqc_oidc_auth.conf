# This configuration is used for Okta authentication

CGIDScriptTimeout 100

LoadModule auth_openidc_module /lib/apache2/modules/mod_auth_openidc.so

# === OIDC settings ===
OIDCProviderMetadataURL            ${OIDCProviderMetadataURL}
OIDCRedirectURI                    /callback
OIDCClientID                       ${OIDCClientID}
OIDCClientSecret                   ${OIDCClientSecret}
OIDCCryptoPassphrase               ${OIDCCryptoPassphrase}
OIDCScope                          "openid email profile"
OIDCRemoteUserClaim                preferred_username
OIDCPassClaimsAs                   environment
OIDCRefreshAccessTokenBeforeExpiry 0
OIDCSSLValidateServer              On
OIDCResponseType                   code

# Session / Cookie Settings
OIDCSessionType                    server-cache:persistent
OIDCCacheType                      shm
OIDCCacheShmEntrySizeMax           65536

# Session duration
OIDCSessionInactivityTimeout       1800
OIDCSessionMaxDuration             28800

# Cookie settings
OIDCCookie                         ${OIDCCookieName}
OIDCCookiePath                     /
OIDCCookieDomain                   ${OIDCCookieDomain}
OIDCCookieHTTPOnly                 On
OIDCCookieSameSite                 Off

# Unset header
RequestHeader unset OIDC_CLAIM_sub
RequestHeader unset OIDC_CLAIM_email
RequestHeader unset OIDC_CLAIM_name
RequestHeader unset OIDC_CLAIM_preferred_username
RequestHeader unset OIDC_CLAIM_groups
RequestHeader unset OIDC_access_token
RequestHeader unset OIDC_id_token

# Everything else - allow through but inject headers if logged in
<Location />
    AuthType openid-connect
    Require valid-user
    OIDCUnAuthAction pass
</Location>

# Callback
<Location /callback>
    AuthType openid-connect
    Require valid-user
</Location>

# Initialte OKTA Authentication
<Location /auth/login>
    AuthType openid-connect
    Require valid-user
    OIDCUnAuthAction auth
</Location>

# Pass required OIDC values to backend
RequestHeader set X-OIDC-name %{OIDC_CLAIM_name}e env=OIDC_CLAIM_name
RequestHeader set X-OIDC-Preferred-User %{OIDC_CLAIM_preferred_username}e env=OIDC_CLAIM_preferred_username
